services:
  orbitways-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: orbitways-api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8001"
    volumes:
      - ./persistent/data:/app/data
      - ./persistent/backups:/app/backups
    networks:
      - orbitways
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).read()"
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  orbitways-backup:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: orbitways-backup
    restart: unless-stopped
    env_file:
      - .env
    command:
      - python
      - deploy/backup_sqlite.py
      - --loop
    volumes:
      - ./persistent/data:/app/data
      - ./persistent/backups:/app/backups
    networks:
      - orbitways
    depends_on:
      orbitways-api:
        condition: service_healthy

  caddy:
    image: caddy:2.8-alpine
    container_name: orbitways-caddy
    restart: unless-stopped
    environment:
      API_DOMAIN: ${API_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - orbitways
    depends_on:
      orbitways-api:
        condition: service_healthy

networks:
  orbitways:

volumes:
  caddy_data:
  caddy_config:
