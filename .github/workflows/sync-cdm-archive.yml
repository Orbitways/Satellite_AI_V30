name: Sync Space-Track CDM archive

on:
  schedule:
    # GitHub Actions cron uses UTC. Run every 8 hours.
    - cron: "17 */8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: spacetrack-cdm-archive
  cancel-in-progress: false

jobs:
  sync-cdms:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SPACETRACK_EMAIL: ${{ secrets.SPACETRACK_EMAIL }}
      SPACETRACK_PASSWORD: ${{ secrets.SPACETRACK_PASSWORD }}
      CDM_SYNC_INTERVAL_HOURS: "8"
      CDM_SYNC_INITIAL_LOOKBACK_DAYS: "30"
      CDM_SYNC_MAX_LOOKBACK_DAYS: "30"
      CDM_SYNC_OVERLAP_HOURS: "24"
      CDM_SYNC_MAX_RECORDS: "50000"

    steps:
      - name: Check out application code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate required secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${SPACETRACK_EMAIL:-}" || { echo "Missing repository secret SPACETRACK_EMAIL"; exit 1; }
          test -n "${SPACETRACK_PASSWORD:-}" || { echo "Missing repository secret SPACETRACK_PASSWORD"; exit 1; }

      - name: Restore previous CDM database snapshot
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data
          if git fetch origin cdm-archive:refs/remotes/origin/cdm-archive 2>/dev/null && \
             git cat-file -e origin/cdm-archive:data/tle_database.sqlite.gz 2>/dev/null; then
            git show origin/cdm-archive:data/tle_database.sqlite.gz | gzip -dc > data/tle_database.sqlite
            echo "Restored prior archive snapshot."
          else
            echo "No prior archive snapshot found; the first run will initialize a 30-day archive."
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install sync dependencies
        run: python -m pip install --upgrade pip spacetrack

      - name: Synchronize all visible public CDMs
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/run_cdm_auto_sync.sh --once --force
          bash scripts/run_cdm_auto_sync.sh --status > /tmp/cdm-status.json
          python -m json.tool /tmp/cdm-status.json

      - name: Checkpoint and validate SQLite archive
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import sqlite3
          from pathlib import Path

          path = Path("data/tle_database.sqlite")
          if not path.exists():
              raise SystemExit("CDM database was not created")

          conn = sqlite3.connect(path)
          try:
              conn.execute("PRAGMA wal_checkpoint(TRUNCATE)")
              integrity = conn.execute("PRAGMA integrity_check").fetchone()[0]
              total = conn.execute("SELECT COUNT(*) FROM cdm_records").fetchone()[0]
              targets = conn.execute("SELECT COUNT(DISTINCT target_norad) FROM cdm_records").fetchone()[0]
              latest = conn.execute("SELECT MAX(creation_date) FROM cdm_records").fetchone()[0]
          finally:
              conn.close()

          if integrity != "ok":
              raise SystemExit(f"SQLite integrity check failed: {integrity}")
          print({"total_cdm_records": total, "unique_targets": targets, "latest_creation_date": latest})
          PY
          gzip -9 -c data/tle_database.sqlite > /tmp/tle_database.sqlite.gz
          cp /tmp/cdm-status.json /tmp/cdm-status-latest.json

      - name: Publish snapshot to cdm-archive branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git show-ref --verify --quiet refs/remotes/origin/cdm-archive; then
            git switch --force-create cdm-archive origin/cdm-archive
          else
            git switch --orphan cdm-archive
            git rm -rf . >/dev/null 2>&1 || true
          fi

          mkdir -p data
          cp /tmp/tle_database.sqlite.gz data/tle_database.sqlite.gz
          cp /tmp/cdm-status-latest.json data/cdm-status-latest.json
          cat > README.md <<'EOF'
          # Orbitways CDM archive

          This branch is maintained automatically by GitHub Actions.

          - `data/tle_database.sqlite.gz`: compressed SQLite archive containing the CDM database and sync state.
          - `data/cdm-status-latest.json`: status report from the latest successful synchronization.

          Do not edit this branch manually.
          EOF

          git add README.md data/tle_database.sqlite.gz data/cdm-status-latest.json
          if git diff --cached --quiet; then
            echo "Archive unchanged; nothing to publish."
            exit 0
          fi

          git commit -m "chore(cdm): refresh Space-Track archive $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push origin cdm-archive
